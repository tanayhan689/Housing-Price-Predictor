<!DOCTYPE html>
<html>
<head>
    <title>Housing Price Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px #ccc;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        h2 {
            color: #333;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Housing Price Predictor</h2>

    <input id="MedInc" placeholder="Median Income"><br>
    <input id="HouseAge" placeholder="House Age"><br>
    <input id="AveRooms" placeholder="Average Rooms"><br>
    <input id="AveBedrms" placeholder="Bedrooms"><br>
    <input id="Population" placeholder="Population"><br>
    <input id="AveOccup" placeholder="Occupancy"><br>
    <input id="Latitude" placeholder="Latitude"><br>
    <input id="Longitude" placeholder="Longitude"><br>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>
{% raw %}
<script>
async function predict() {
    const data = {
        MedInc: parseFloat(document.getElementById("MedInc").value),
        HouseAge: parseFloat(document.getElementById("HouseAge").value),
        AveRooms: parseFloat(document.getElementById("AveRooms").value),
        AveBedrms: parseFloat(document.getElementById("AveBedrms").value),
        Population: parseFloat(document.getElementById("Population").value),
        AveOccup: parseFloat(document.getElementById("AveOccup").value),
        Latitude: parseFloat(document.getElementById("Latitude").value),
        Longitude: parseFloat(document.getElementById("Longitude").value)
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
        "Predicted Price: $" + (result.predicted_house_value * 100000).toFixed(0);
}
</script>
{% endraw %}
</body>
</html>
